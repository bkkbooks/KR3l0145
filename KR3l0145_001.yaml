body:
  text: 泰嶽府君記泰嶽府君記胡母班字季友泰山人也曾至泰山之側忽於樹間逢一絳衣騶呼班云泰山府君召班驚愕逡巡未答復有一騶出呼之遂隨行數十步騶請班暫瞑少頃便見宮室威儀甚嚴班乃入閣拜謁主為設食語班曰欲見君無他欲附書與女壻耳班問女郎何在曰女為河伯婦班曰輒當奉書不知緣何得達答曰今適河中流便扣舟呼青衣當自有取書者班乃辭出昔騶復令閉目有頃忽如故道遂西行如神言而呼青衣須臾果有一女僕出取書而沒少頃復出云河伯欲暫見君婢亦請瞑目遂拜謁河伯河伯乃大設酒食詞旨殷勤臨去謂班曰感君遠為致書無物相奉於是命左右取吾青絲履來以貽班班出瞑然忽得還舟遂於長安經年而還至泰山側不敢潛過遂扣樹自稱姓名從長安還欲啟消息須臾昔騶出引班如向法而進因致書焉府君謂曰當別再報班語訖如廁忽見其父著械徒作此輩數百人班進拜流涕問大人何因及此父云吾死不幸見遣三年今已二年矣困苦不可處知汝今為明府所識可為吾陳之乞免此役便欲得社公耳班乃依教叩頭陳乞府君曰生死異路不可相近身無所惜班苦請方許之於是辭出還家歲餘兒子死亡略盡班惶懼復詣泰山扣樹求見昔騶遂迎之而見班乃自說昔辭曠拙及還家兒死亡至盡今恐禍故未已輒來啟白幸蒙哀救府君拊掌大笑曰昔語君生死異路不可相近故也即敕外召班父須臾至庭中問之昔求還里社當為門戶作福而孫息死亡至盡何也答云久別鄉里自忻得還又遇酒食充足實念諸孫召之於是班之父涕泣而出班遂還後有兒皆無恙
